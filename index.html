    function hexToRgb(h) {
      const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
      return r ? [parseInt(r[1], 16), parseInt(r[2], 16), parseInt(r[3], 16)] : null;
    }

    function rgbToLab(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
      g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
      b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
      let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) * 100;
      let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) * 100;
      let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) * 100;
      x /= 95.047; y /= 100.0; z /= 108.883;
      x = x > 0.008856 ? Math.pow(x, 1 / 3) : (7.787 * x) + (16 / 116);
      y = y > 0.008856 ? Math.pow(y, 1 / 3) : (7.787 * y) + (16 / 116);
      z = z > 0.008856 ? Math.pow(z, 1 / 3) : (7.787 * z) + (16 / 116);
      return [(116 * y) - 16, 500 * (x - y), 200 * (y - z)];
    }

    function hexToLab(h) {
      const rgb = hexToRgb(h);
      return rgb ? rgbToLab(...rgb) : [0, 0, 0];
    }

        }

        function calculateTotals() {
            let total = 0; document.querySelectorAll('#paintSlidersContainer input[type="range"]').forEach(s => total += Number(s.value));
            const factor = currentState.volumeFactor;
            if (elements.totalPigmentWeight) elements.totalPigmentWeight.textContent = `${total.toFixed(1)}g`;
            if (elements.scoopEstimate) elements.scoopEstimate.textContent = `(${currentLanguage === 'zh' ? '约' : ''}${Math.round(total / 50)}${currentLanguage === 'zh' ? '勺' : ' spoons'})`;
            if (elements.varnishAmount) elements.varnishAmount.textContent = `${currentState.volume.toUpperCase()}`;
            if (elements.perLiterAmount) elements.perLiterAmount.textContent = factor > 0 ? `${(total / factor).toFixed(1)}g` : '0.0g';
            const ratio = total > 0 ? Math.round((total / (total + factor * 1000)) * 100) : 0;
            if (elements.mixingRatio) elements.mixingRatio.textContent = `${ratio} : ${100 - ratio}`;
        }

        function updatePaintChart() {
            if (!paintChart) return;
            const labels = [], data = [], colors = [];
            Object.keys(PAINT_DATA).forEach(code => {
                const slider = document.getElementById(`slider${code}`);
                const val = Number(slider ? slider.value : 0);
                if (val > 0.05) {
                    labels.push(`${PAINT_DATA[code][`name_${currentLanguage}`] || PAINT_DATA[code].name_en} (${val.toFixed(1)}g)`);
                    data.push(val);
                    const colorMap = { Y: '#F4C430', R: '#B91D23', V: '#800080', B: '#2A58D1', G: '#229954', BK: '#000000', W: '#E0E0E0' };
                    colors.push(colorMap[code.charAt(0)] || '#CCCCCC');
                }
            });
            paintChart.data = { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 1 }] };
            paintChart.update();
        }

        function resetAllSliders(notify = false) {
            document.querySelectorAll('#paintSlidersContainer input[type="range"]').forEach(s => {
                s.value = 0; s.disabled = false;
                s.classList.remove('bg-gray-300', 'cursor-not-allowed');
                const display = document.getElementById(`value${s.dataset.paint}`);
                if (display) display.textContent = '0.0g';
            });
            calculateTotals(); updatePaintChart();
            if (notify) showNotification(currentLanguage === 'zh' ? '颜料已清空' : 'Cleared');
        }

        function updatePaintWeights(baseRecipe) {
            resetAllSliders();
            const factor = currentState.volumeFactor;
            Object.keys(baseRecipe).forEach(code => {
                const val = (baseRecipe[code] / 100) * TOTAL_PIGMENT_PER_LITER * factor;
                const slider = document.getElementById(`slider${code}`);
                if (slider) {
                    slider.value = val;
                    const display = document.getElementById(`value${code}`);
                    if (display) display.textContent = `${val.toFixed(1)}g`;
                }
            });
            calculateTotals(); updatePaintChart();
            document.querySelectorAll('#paintSlidersContainer input[type="range"]').forEach(s => {
                s.disabled = true; s.classList.add('bg-gray-300', 'cursor-not-allowed');
            });
        }

        function generateReferenceRecipe() {
            if (!currentState.ral || currentState.ral.ral === 'RAL') {
                showNotification("zh" === currentLanguage ? "请先选择一个RAL颜色" : "Select a RAL color first", "error");
                return;
            }
            const targetLab = hexToLab(currentState.ral.hex);
            let tAngle = Math.atan2(targetLab[2], targetLab[1]) * 180 / Math.PI;
            if(tAngle < 0) tAngle += 360;
            const tL = targetLab[0], tChroma = Math.sqrt(targetLab[1]**2 + targetLab[2]**2);
            
            let recipe = {};
            if(tChroma < 10) {
              if(tL > 90) { recipe.W064 = 98; recipe.BK7H = (100 - tL) * 0.5; }
              else { recipe.W064 = (tL / 100) * 80; recipe.BK7H = ((100 - tL) / 100) * 40 / PAINT_DATA.BK7H.strength; }
            } else {
              const chromatic = Object.entries(PAINT_DATA).filter(([code, p]) => code !== 'W064' && code !== 'BK7H' && p.chroma > 20).map(([code, p]) => ({code, hue: p.hue, data: p}));
              chromatic.sort((a, b) => a.hue - b.hue);
              let p1 = null, p2 = null;
              for(let i=0; i<chromatic.length; i++){
                let cur = chromatic[i], next = chromatic[(i + 1) % chromatic.length];
                let h1 = cur.hue, h2 = next.hue; if (h2 < h1) h2 += 360;
                let th = tAngle; if (th < h1 && (h1 - th > 180)) th += 360;
                if(th >= h1 && th <= h2) { p1 = cur; p2 = next; break; }
              }
              if(!p1) { p1 = chromatic[0]; p2 = chromatic[1]; }
              let ratio = (tAngle - p1.hue) / (p2.hue - p1.hue); if(isNaN(ratio)) ratio = 0.5;
              recipe[p1.code] = 50 * (1 - ratio); recipe[p2.code] = 50 * ratio;
              let curL = (p1.data.lab[0] * (1-ratio)) + (p2.data.lab[0] * ratio);
              if(tL > curL) recipe.W064 = (tL - curL) * 3 / PAINT_DATA.W064.strength;
              else recipe.BK7H = (curL - tL) * 0.5 / PAINT_DATA.BK7H.strength;
            }
            const final = {}; let ft = 0; Object.values(recipe).forEach(v => ft += v);
            Object.entries(recipe).forEach(([k, v]) => { if (v > 0.1) final[k] = (v / ft) * 100; });
            currentState.ral.baseRecipe = final;
            updatePaintWeights(final);
            showNotification("zh" === currentLanguage ? "已应用智能生成配方" : "AI Applied");
        }

        function updateColorDisplay(d) {
            if (!d || !d.ral) return; currentState.ral = d;
            const nameKey = `name_${currentLanguage}`;
            elements.colorSwatch.style.backgroundColor = d.hex;
            elements.currentRalCode.textContent = `${d.ral} (${d[nameKey] || d.name_en})`;
            elements.currentHex.textContent = d.hex.toUpperCase();
            elements.canLabel.textContent = d.ral;
            elements.canBody.style.backgroundColor = d.hex;
        }

        function initRalPalette() {
            elements.ralPaletteContainer.innerHTML = ralPaintMap.map(d => `
                <button class="ral-palette group flex flex-col items-center bg-white p-1 rounded-lg border border-gray-100 hover:border-primary hover:shadow-lg transition-all" data-ral="${d.ral}">
                  <div class="w-full h-8 rounded shadow-inner" style="background-color: ${d.hex};"></div>
                  <div class="text-[8px] font-black mt-1 text-gray-500">${d.ral}</div>
                </button>`).join('');
        }

        function initRecipePresets() {
            elements.recipePresetsContainer.innerHTML = ralPaintMap.filter(c => c.baseRecipe).map(d => `
                <button class="recipe-preset group bg-white border border-gray-200 rounded-2xl p-3 flex items-center gap-3 hover:border-primary transition-all shadow-sm" data-ral="${d.ral}">
                  <div class="w-10 h-10 rounded-xl shadow-inner flex-shrink-0" style="background-color: ${d.hex};"></div>
                  <div class="text-left overflow-hidden">
                    <div class="text-[10px] font-black text-gray-800 leading-tight truncate uppercase tracking-tighter">${d[`name_${currentLanguage}`] || d.name_en}</div>
                    <div class="text-[9px] text-primary font-bold">${d.ral}</div>
                  </div>
                </button>`).join('');
        }

        function switchLanguage(l) {
            currentLanguage = l; document.documentElement.lang = l === 'zh' ? 'zh-CN' : l;
            const trans = TRANSLATIONS[l];
            Object.keys(trans).forEach(k => {
                document.querySelectorAll(`[data-i18n="${k}"]`).forEach(el => {
                   if (el.children.length > 0) {
                     for (let n of el.childNodes) { if (n.nodeType === 3) { n.nodeValue = trans[k].endsWith(':') ? `${trans[k]} ` : trans[k]; break; } }
                   } else { el.textContent = trans[k]; }
                });
            });
            const includes = l === 'zh' ? ['RAL代码和颜色','各颜料精确重量','基料用量与比例'] : l === 'en' ? ['RAL Code & Color','Precise Weights','Base & Ratio'] : ['RALコードと色','正確な重量','ベース量と比率'];
            elements.recipeIncludesList.innerHTML = includes.map(t => `<li class="flex items-center gap-1.5"><i class="fa fa-check-circle text-green-500"></i>${t}</li>`).join('');
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { const k = el.getAttribute('data-i18n-placeholder'); if (trans[k]) el.placeholder = trans[k]; });
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
            Object.keys(PAINT_DATA).forEach(code => {
                const el = document.querySelector(`[data-i18n-paint-name="${code}"]`);
                if (el) el.textContent = `${PAINT_DATA[code][`name_${l}`] || PAINT_DATA[code].name_en} (${code})`;
            });
            initRalSelect(); initRecipePresets(); initRalPalette();
            if (currentState.ral) updateColorDisplay(currentState.ral);
        }

        function initUI() {
            const getPaintColor = c => ({ Y:'#F4C430', R:'#B91D23', V:'#800080', B:'#0057b7', G:'#009a44', BK:'#000000', W:'#FFFFFF' }[c.charAt(0)] || '#CCCCCC');
            elements.paintSlidersContainer.innerHTML = Object.entries(PAINT_DATA).map(([code, p]) => `
                <div class="space-y-2 p-3 bg-white rounded-2xl border border-gray-100 shadow-sm transition-all hover:border-primary/20">
                  <div class="flex items-center justify-between mb-1">
                    <label class="text-[11px] font-black text-gray-500 flex items-center uppercase tracking-tighter">
                      <span class="paint-dot" style="background-color:${getPaintColor(code)}; border-color:${code==='W064'?'#ddd':'transparent'}"></span>
                      <span data-i18n-paint-name="${code}"></span>
                    </label>
                    <span id="value${code}" class="text-[11px] font-black text-primary font-mono bg-primary/5 px-2 py-0.5 rounded-lg border border-primary/10">0.0g</span>
                  </div>
                  <input type="range" id="slider${code}" min="0" max="${TOTAL_PIGMENT_PER_LITER*VOLUME_FACTORS['20l']}" value="0" data-paint="${code}" step="0.1" class="w-full h-1.5">
                </div>`).join('');
            initPaintChart();
        }

        function initRalSelect() {
            const selVal = elements.ralSelect.value;
            elements.ralSelect.innerHTML = `<option value="">${TRANSLATIONS[currentLanguage].select_ral_code}</option>`;
            const grouped = ralPaintMap.reduce((acc, c) => { const grp = c.ral.split(" ")[1].charAt(0); if (!acc[grp]) acc[grp] = []; acc[grp].push(c); return acc; }, {});
            Object.keys(grouped).sort().forEach(g => {
                const group = document.createElement('optgroup'); group.label = `RAL ${g}000 Series`;
                grouped[g].sort((a,b) => a.ral.localeCompare(b.ral, undefined, {numeric: true})).forEach(c => {
                    const opt = document.createElement('option'); opt.value = c.ral; opt.textContent = `${c.ral} - ${c[`name_${currentLanguage}`] || c.name_en}`; group.appendChild(opt);
                });
                elements.ralSelect.appendChild(group);
            });
            elements.ralSelect.value = selVal;
        }

        function initPaintChart() {
            if (paintChart) paintChart.destroy();
            paintChart = new Chart(elements.paintChart.getContext('2d'), { type: 'doughnut', data: { datasets: [{ borderWidth: 1 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { display: false } } } });
        }

        function getRecipeText(detailed = false) {
            let t = `${currentState.ral?.ral || 'Custom'} Recipe\nHex: ${currentState.ral?.hex?.toUpperCase() || 'N/A'}\nVolume: ${currentState.volume.toUpperCase()}\n\nPigments:\n`;
            Object.keys(PAINT_DATA).forEach(code => {
                const slider = document.getElementById(`slider${code}`);
                const w = Number(slider ? slider.value : 0);
                if (w > 0) t += `- ${PAINT_DATA[code][`name_${currentLanguage}`] || PAINT_DATA[code].name_en} (${code}): ${w.toFixed(1)}g\n`;
            });
            t += `\nTotal Pigment: ${elements.totalPigmentWeight.textContent}\nRatio: ${elements.mixingRatio.textContent}`;
            if (detailed) t += `\n\nGenerated by MooCow Mini SMART on ${new Date().toLocaleString()}`;
            return t;
        }

        // --- 5. 事件绑定 ---
        elements.ralSelect.addEventListener('change', e => {
            const d = ralPaintMap.find(c => c.ral === e.target.value);
            if (d) { updateColorDisplay(d); if (d.baseRecipe) updatePaintWeights(d.baseRecipe); else resetAllSliders(); }
        });

        elements.volumeSelect.addEventListener('change', () => {
            currentState.volume = elements.volumeSelect.value; currentState.volumeFactor = VOLUME_FACTORS[currentState.volume];
            if(currentState.ral && currentState.ral.baseRecipe) updatePaintWeights(currentState.ral.baseRecipe); else calculateTotals();
        });

        elements.resetFormulaBtn.addEventListener('click', () => resetAllSliders(true));
        
        elements.addFormulaBtn.addEventListener('click', () => {
            let changed = false;
            document.querySelectorAll('#paintSlidersContainer input[type="range"]').forEach(slider => {
                if (Number(slider.value) > 0) { slider.value = (Number(slider.value) * 1.05).toFixed(1); const disp = document.getElementById(`value${slider.dataset.paint}`); if (disp) disp.textContent = `${Number(slider.value).toFixed(1)}g`; changed = true; }
            });
            if(changed) { calculateTotals(); updatePaintChart(); showNotification(currentLanguage === 'zh' ? '配方已微调 (+5%)' : 'Adjusted'); }
        });

        elements.generateRecipeBtn.addEventListener('click', generateReferenceRecipe);
        
        document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => switchLanguage(b.dataset.lang)));
        
        elements.paintSlidersContainer.addEventListener('input', e => {
            if (e.target.type === 'range') { 
                const display = document.getElementById(`value${e.target.dataset.paint}`);
                if (display) display.textContent = `${Number(e.target.value).toFixed(1)}g`; 
                calculateTotals(); updatePaintChart(); 
            }
        });

        elements.ralPaletteContainer.addEventListener('click', e => {
            const btn = e.target.closest('.ral-palette');
            if (btn) { const d = ralPaintMap.find(c => c.ral === btn.dataset.ral); if (d) { elements.ralSelect.value = d.ral; elements.ralSelect.dispatchEvent(new Event('change')); window.scrollTo({top:0, behavior:'smooth'}); } }
        });

        elements.recipePresetsContainer.addEventListener('click', e => {
            const btn = e.target.closest('.recipe-preset');
            if (btn) { const d = ralPaintMap.find(c => c.ral === btn.dataset.ral); if (d) { elements.ralSelect.value = d.ral; elements.ralSelect.dispatchEvent(new Event('change')); window.scrollTo({top:0, behavior:'smooth'}); } }
        });

        elements.exportRecipeBtn.addEventListener('click', () => {
            const blob = new Blob([getRecipeText(true)], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download=`${currentState.ral?.ral || 'Recipe'}.txt`; a.click();
        });

        elements.copyRecipeBtn.addEventListener('click', async () => {
            try { await navigator.clipboard.writeText(getRecipeText()); showNotification('已复制到剪贴板'); } catch { showNotification('复制失败','error'); }
        });

        elements.ralSearch.addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            if(!term){ elements.searchSuggestions.classList.add('hidden'); return; }
            const res = ralPaintMap.filter(c => c.ral.toLowerCase().includes(term) || c.name_en.toLowerCase().includes(term) || (c.name_zh && c.name_zh.includes(term)));
            elements.searchSuggestions.innerHTML = res.slice(0, 10).map(c => `
                <div class="p-3 hover:bg-primary/5 cursor-pointer text-[10px] font-black border-b border-gray-50 flex items-center gap-3" data-ral="${c.ral}">
                    <div class="w-5 h-5 rounded shadow-sm flex-shrink-0" style="background-color:${c.hex}"></div>
                    <div class="truncate">${c.ral} - ${c[`name_${currentLanguage}`] || c.name_en}</div>
                </div>`).join('');
            elements.searchSuggestions.classList.remove('hidden');
        });

        elements.searchSuggestions.addEventListener('click', e => {
            const el = e.target.closest('[data-ral]'); if(!el) return;
            const d = ralPaintMap.find(c => c.ral === el.dataset.ral);
            if(d) { elements.ralSelect.value = d.ral; elements.ralSelect.dispatchEvent(new Event('change')); elements.searchSuggestions.classList.add('hidden'); elements.ralSearch.value=''; }
        });

        document.addEventListener('click', e => { if (!elements.ralSearch.parentElement.contains(e.target)) elements.searchSuggestions.classList.add('hidden');});

        // --- 6. 启动初始化 ---
        initUI(); switchLanguage('zh'); 
        updateColorDisplay({ral:'RAL 1021', name_zh:'油菜黄', name_en:'Colza Yellow', hex:'#F3DA0B'});
    });
  </script>
</body>
</html>
