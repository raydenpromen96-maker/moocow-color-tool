<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MooCow Mini 调色工具 (Smart Match Ver.)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2A58D1', secondary: '#F4C430', accent: '#B91D23',
            neutral: '#F1F5F9', dark: '#1E293B', panel: '#FFFFFF',
          },
          fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
          boxShadow: { 'card': '0 4px 20px -2px rgba(0,0,0,0.05)' }
        },
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .slider-thumb { @apply appearance-none w-7 h-7 md:w-8 md:h-8 rounded-full cursor-pointer transition-transform duration-100 shadow-md border-[3px] border-white; }
      .lang-btn { @apply px-3 py-1.5 text-xs font-bold rounded transition-all duration-200 border border-transparent; }
    }
    
    body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
    
    input[type="range"] { 
      @apply appearance-none w-full h-4 rounded-full bg-gray-200 outline-none shadow-inner;
      touch-action: none;
    }
    input[type="range"]::-webkit-slider-thumb { @apply slider-thumb; }
    input[type="range"]::-moz-range-thumb { @apply slider-thumb; }
    input[type="range"]:disabled { @apply opacity-50 cursor-not-allowed; }
    
    .lang-btn.active { @apply bg-white text-primary shadow-sm; }
    .lang-btn:not(.active) { @apply bg-black/10 text-white hover:bg-black/20; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-neutral font-sans text-slate-800 pb-12 selection:bg-primary selection:text-white">

  <!-- App Header -->
  <header class="bg-primary text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex flex-col">
        <h1 class="text-lg md:text-xl font-black tracking-tight flex items-center gap-1.5">
          MooCow 
          <span class="text-[9px] md:text-[10px] bg-accent px-1.5 py-0.5 rounded shadow-sm">SMART MIX</span>
        </h1>
        <span class="text-[10px] text-blue-200 font-medium" data-i18n="subtitle">智能调色助手</span>
      </div>
      <div class="flex gap-1 bg-black/10 p-1 rounded-lg">
        <button class="lang-btn active" data-lang="zh">中</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ja">日</button>
      </div>
    </div>
  </header>

  <div class="max-w-4xl mx-auto p-4 space-y-5 mt-2">

    <!-- 提示区 -->
    <div class="bg-blue-50 border-l-4 border-primary rounded-r-lg p-3 flex items-start gap-3 shadow-sm text-xs">
      <i class="fa fa-info-circle text-primary text-base mt-0.5"></i>
      <div>
        <strong class="text-slate-800 block mb-0.5" data-i18n="disclaimer_title">算法升级说明</strong>
        <span class="text-slate-600 leading-relaxed" data-i18n="disclaimer_text">本版本采用'色相定点-亮度拟合'算法，已载入各色浆着色力(Strength)等物理数据。</span>
      </div>
    </div>

    <!-- 模块 1：色彩目标选择 -->
    <section class="bg-panel rounded-2xl shadow-card overflow-hidden border border-gray-100">
      <div class="w-full h-32 md:h-48 rounded-t-2xl overflow-hidden shadow-inner flex relative border-b border-gray-200">
        <!-- 目标色 -->
        <div id="targetColorArea" class="w-1/2 h-full bg-gray-200 transition-colors duration-500 relative group">
          <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-sm text-slate-800 px-2.5 py-1 rounded text-[11px] font-black shadow-sm" id="currentRalCode">RAL ----</div>
          <div class="absolute bottom-3 left-3 bg-black/40 backdrop-blur text-white text-[10px] px-2 py-1 rounded">目标色 Target</div>
        </div>
        <!-- 混合色 (实时预览) -->
        <div id="mixedColorArea" class="w-1/2 h-full bg-white transition-colors duration-100 relative border-l border-white/20">
          <div class="absolute top-3 right-3 bg-black/40 backdrop-blur-sm text-white px-2.5 py-1 rounded text-[11px] font-mono font-bold tracking-wider shadow-sm" id="currentHex">#000000</div>
          <div class="absolute bottom-3 right-3 bg-black/40 backdrop-blur text-white text-[10px] px-2 py-1 rounded">混合色 Mixed</div>
        </div>
      </div>
      
      <div class="p-4 md:p-6 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="relative">
            <label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase" data-i18n="ral_search_label">RAL搜索</label>
            <div class="relative">
              <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="text" id="ralSearch" data-i18n-placeholder="ral_search_placeholder" class="w-full pl-9 pr-3 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary/30 outline-none text-sm font-bold transition-all">
            </div>
            <div id="searchSuggestions" class="absolute w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-xl z-50 max-h-48 overflow-y-auto hidden"></div>
          </div>
          <div>
            <label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase" data-i18n="ral_select_label">快速选择</label>
            <select id="ralSelect" class="w-full px-3 py-3 bg-slate-50 border border-gray-200 rounded-xl outline-none text-sm font-bold cursor-pointer transition-all focus:ring-2 focus:ring-primary/30"></select>
          </div>
        </div>
      </div>
    </section>

    <!-- 模块 2：配方数据仪表盘 -->
    <section class="bg-panel rounded-2xl shadow-card border border-gray-100 p-4 md:p-6 space-y-5">
      <div class="flex items-center justify-between border-b border-gray-100 pb-3">
        <h2 class="text-sm font-black uppercase tracking-widest text-primary flex items-center gap-2">
          <i class="fa fa-flask"></i> <span data-i18n="paint_ratio">混合详情</span>
        </h2>
        <div class="flex items-center gap-2">
          <label class="text-[10px] font-bold text-slate-400 uppercase" data-i18n="volume_selection">基料容量:</label>
          <select id="volumeSelect" class="bg-slate-100 text-xs font-black px-2 py-1.5 rounded border-none outline-none focus:ring-2 focus:ring-primary/30 text-slate-700">
            <option value="50ml">50 ML</option>
            <option value="100ml">100 ML</option>
            <option value="500ml">500 ML</option>
            <option value="1l" selected>1 L</option>
            <option value="5l">5 L</option>
            <option value="20l">20 L</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="bg-slate-50 rounded-xl p-3 flex flex-col justify-center border border-gray-100">
          <span class="text-[10px] font-bold text-slate-400 uppercase mb-1" data-i18n="total_pigment_weight">总颜料重量</span>
          <div class="flex items-end gap-1">
            <strong class="text-2xl font-black text-primary font-mono leading-none" id="totalPigmentWeight">0.0g</strong>
            <span id="scoopEstimate" class="text-[10px] text-primary/60 font-bold mb-0.5">(约0勺)</span>
          </div>
        </div>
        <div class="bg-slate-50 rounded-xl p-3 flex flex-col justify-center border border-gray-100">
          <span class="text-[10px] font-bold text-slate-400 uppercase mb-1" data-i18n="per_liter_usage">每升用量</span>
          <strong class="text-2xl font-black text-slate-700 font-mono leading-none" id="perLiterAmount">0.0g</strong>
        </div>
      </div>
      
      <div class="bg-slate-50 rounded-xl p-3 flex justify-between items-center border border-gray-100">
        <span class="text-[11px] font-bold text-slate-500 uppercase" data-i18n="mixing_ratio">混合比例 P:B</span>
        <strong class="text-lg font-black text-accent font-mono leading-none" id="mixingRatio">0 : 100</strong>
      </div>
      
      <button id="generateRecipeBtn" class="w-full py-3.5 bg-dark text-white rounded-xl font-black text-sm uppercase tracking-widest hover:bg-slate-800 active:scale-[0.98] transition-all shadow-md flex justify-center items-center gap-2">
        <i class="fa fa-magic text-secondary"></i> <span data-i18n="generate_recipe">AI 智能生成配方</span>
      </button>
    </section>

    <!-- 模块 3：颜料滑块区 -->
    <section class="bg-panel rounded-2xl shadow-card border border-gray-100 p-4 md:p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-sm font-black uppercase text-slate-800 flex items-center gap-2">
          <i class="fa fa-sliders text-primary"></i> <span data-i18n="paint_weight_adjustment">颜料重量调节</span>
        </h2>
        <div class="flex gap-2">
          <button id="resetFormulaBtn" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-[10px] font-bold hover:bg-slate-200 transition flex items-center gap-1 active:scale-95">
            <i class="fa fa-unlock-alt"></i> <span data-i18n="reset_formula">清空颜料</span>
          </button>
          <button id="addFormulaBtn" class="bg-secondary/20 text-yellow-700 px-3 py-1.5 rounded-lg text-[10px] font-bold hover:bg-secondary/30 transition flex items-center gap-1 active:scale-95">
            <i class="fa fa-plus"></i> <span data-i18n="add_formula">微调 (+5%)</span>
          </button>
        </div>
      </div>
      
      <div id="paintSlidersContainer" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
        <!-- JS 动态注入 -->
      </div>
    </section>

    <!-- 模块 4：可视化分析与导出 -->
    <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="bg-panel rounded-2xl shadow-card border border-gray-100 p-5 flex flex-col justify-center items-center h-56">
        <div class="w-full h-full relative max-w-[200px]">
          <canvas id="paintChart"></canvas>
        </div>
      </div>

      <div class="bg-dark rounded-2xl shadow-card p-5 text-white flex flex-col justify-between relative overflow-hidden h-56">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/5 rounded-full blur-xl pointer-events-none"></div>
        <h2 class="text-sm font-black uppercase tracking-widest relative z-10" data-i18n="package_preview_export">预览与导出</h2>
        
        <div class="space-y-3 relative z-10">
          <div class="bg-white/5 p-3 rounded-lg border border-white/5 shadow-inner">
            <h3 class="text-[9px] font-bold text-gray-400 uppercase mb-1.5" data-i18n="recipe_includes_title">配方包含</h3>
            <ul class="text-[10px] text-gray-300 space-y-1" id="recipeIncludesList"></ul>
          </div>
          
          <div class="flex gap-2">
            <button id="copyRecipeBtn" class="flex-1 py-3 bg-white/10 rounded-xl font-bold text-xs uppercase hover:bg-white/20 transition flex justify-center items-center gap-2 border border-white/10 active:scale-95">
              <i class="fa fa-copy"></i><span data-i18n="copy_recipe">复制</span>
            </button>
            <button id="exportRecipeBtn" class="flex-1 py-3 bg-primary rounded-xl font-bold text-xs uppercase hover:bg-blue-600 transition flex justify-center items-center gap-2 active:scale-95">
              <i class="fa fa-download"></i><span data-i18n="export_recipe">导出</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- 模块 5：预设与色卡展示区 -->
    <section class="pt-2">
      <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 pl-1" data-i18n="recommended_recipes">推荐配方库 (点击加载)</h3>
      <div class="flex overflow-x-auto gap-3 pb-4 hide-scrollbar" id="recipePresetsContainer">
        <!-- 动态生成 -->
      </div>
    </section>

    <section class="pb-6">
      <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 pl-1" data-i18n="ral_palette">RAL 颜色全集</h3>
      <div class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 gap-2 bg-panel p-3 rounded-2xl border border-gray-100 shadow-card max-h-[300px] overflow-y-auto" id="ralPaletteContainer">
        <!-- 动态生成 -->
      </div>
    </section>

  </div>
  
  <div id="notification" class="fixed top-4 left-1/2 -translate-x-1/2 bg-dark text-white px-6 py-3 rounded-full shadow-2xl transform -translate-y-20 opacity-0 transition-all duration-300 z-[100] text-xs font-bold flex items-center gap-2 min-w-max"></div>

    /**
     * ==========================================
     * 2. 核心算法区 (完全保留你的原版计算方法)
     * ==========================================
     */
    function hexToRgb(h) {
      const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
      return r ? [parseInt(r[1], 16), parseInt(r[2], 16), parseInt(r[3], 16)] : null;
    }
    
    function rgbToLab(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
      g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
      b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
      let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) * 100;
      let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) * 100;
      let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) * 100;
      x /= 95.047; y /= 100.0; z /= 108.883;
      x = x > 0.008856 ? Math.pow(x, 1 / 3) : (7.787 * x) + (16 / 116);
      y = y > 0.008856 ? Math.pow(y, 1 / 3) : (7.787 * y) + (16 / 116);
      z = z > 0.008856 ? Math.pow(z, 1 / 3) : (7.787 * z) + (16 / 116);
      return [(116 * y) - 16, 500 * (x - y), 200 * (y - z)];
    }
    
    function hexToLab(h) { 
        const rgb = hexToRgb(h); 
        return rgb ? rgbToLab(...rgb) : [0, 0, 0]; 
    }

    /**
     * ==========================================
     * [新增] 模拟人类视觉 Oklab 空间与物理混合引擎
     * ==========================================
     */
    function srgbToLinear(c) {
        return c > 0.04045 ? Math.pow((c + 0.055) / 1.055, 2.4) : c / 12.92;
    }
    
    function linearToSrgb(c) {
        return c > 0.0031308 ? 1.055 * Math.pow(c, 1 / 2.4) - 0.055 : 12.92 * c;
    }
    
    function srgbToOklab(r, g, b) {
        let lR = srgbToLinear(r/255), lG = srgbToLinear(g/255), lB = srgbToLinear(b/255);
        let l = 0.4122214708 * lR + 0.5363325363 * lG + 0.0514459929 * lB;
        let m = 0.2119034982 * lR + 0.6806995451 * lG + 0.1073969566 * lB;
        let s = 0.0883024619 * lR + 0.2817188376 * lG + 0.6299787005 * lB;
        let l_ = Math.cbrt(l), m_ = Math.cbrt(m), s_ = Math.cbrt(s);
        let L = 0.2104542553*l_ + 0.7936177850*m_ - 0.0040720468*s_;
        let a = 1.9779984951*l_ - 2.4285922050*m_ + 0.4505937099*s_;
        let b_ = 0.0259040371*l_ + 0.7827717662*m_ - 0.8086757660*s_;
        return [L, a, b_];
    }
    
    function deltaEOklab(lab1, lab2) {
        let dL = lab1[0] - lab2[0], da = lab1[1] - lab2[1], db = lab1[2] - lab2[2];
        return Math.sqrt(dL*dL + da*da + db*db);
    }

    /**
     * ==========================================
     * [核弹级升级] 库贝尔卡-蒙克 (Kubelka-Munk) 物理光学理论
     * 通过反射率推算颜料的吸收/散射比 (K/S)
     * ==========================================
     */
    function clampR(r) { return Math.max(0.001, Math.min(0.999, r)); }
    function getKS(r) { let rc = clampR(r); return Math.pow(1 - rc, 2) / (2 * rc); }
    function getRfromKS(ks) { return 1 + ks - Math.sqrt(Math.pow(ks, 2) + 2 * ks); }

        let paintChart = null;
        let currentState = { ral: null, volume: '1l', volumeFactor: 1, colorOffset: null };
        const TOTAL_PIGMENT_PER_LITER = 106;
        const VOLUME_FACTORS = {'50ml': 0.05, '100ml': 0.1, '500ml': 0.5, '1l': 1, '5l': 5, '20l': 20};

        const elements = {
            ralSearch: document.getElementById("ralSearch"),
            ralSelect: document.getElementById("ralSelect"),
            targetColorArea: document.getElementById("targetColorArea"),
            mixedColorArea: document.getElementById("mixedColorArea"),
            currentRalCode: document.getElementById("currentRalCode"),
            currentHex: document.getElementById("currentHex"),
            volumeSelect: document.getElementById("volumeSelect"),
            paintSlidersContainer: document.getElementById("paintSlidersContainer"),
            totalPigmentWeight: document.getElementById("totalPigmentWeight"),
            scoopEstimate: document.getElementById("scoopEstimate"),
            perLiterAmount: document.getElementById("perLiterAmount"),
            mixingRatio: document.getElementById("mixingRatio"),
            addFormulaBtn: document.getElementById("addFormulaBtn"),
            resetFormulaBtn: document.getElementById("resetFormulaBtn"),
            paintChart: document.getElementById("paintChart"),
            notification: document.getElementById("notification"),
            searchSuggestions: document.getElementById("searchSuggestions"),
            exportRecipeBtn: document.getElementById('exportRecipeBtn'),
            copyRecipeBtn: document.getElementById('copyRecipeBtn'),
            generateRecipeBtn: document.getElementById('generateRecipeBtn'),
            recipePresetsContainer: document.getElementById("recipePresetsContainer"),
            ralPaletteContainer: document.getElementById('ralPaletteContainer'),
            recipeIncludesList: document.getElementById('recipeIncludesList')
        };

        // 预计算 LAB 数据、色相角度、以及物理 K/S 吸收散射比
        Object.values(PAINT_DATA).forEach(p => { 
          p.lab = p.manualLab || hexToLab(p.hex);
          let angle = Math.atan2(p.lab[2], p.lab[1]) * 180 / Math.PI;
          p.hue = angle < 0 ? angle + 360 : angle; 
          p.chroma = Math.sqrt(p.lab[1]**2 + p.lab[2]**2);

          // [新增] 转换为 Kubelka-Munk 物理吸收散射比 (K/S)
          let rgb = hexToRgb(p.hex);
          p.linear = [srgbToLinear(rgb[0]/255), srgbToLinear(rgb[1]/255), srgbToLinear(rgb[2]/255)];
          p.ks = p.linear.map(getKS);
        });

        function showNotification(m, t = 'success') {
            elements.notification.innerHTML = `<i class="fa ${t==='error'?'fa-exclamation-triangle':'fa-check-circle'}"></i> <span>${m}</span>`;
            elements.notification.classList.remove('-translate-y-20', 'opacity-0');
            elements.notification.classList.add('translate-y-0', 'opacity-100');
            if(t==='error') elements.notification.classList.replace('bg-dark', 'bg-accent');
            else elements.notification.classList.replace('bg-accent', 'bg-dark');
            setTimeout(() => {
                elements.notification.classList.add('-translate-y-20', 'opacity-0');
                elements.notification.classList.remove('translate-y-0', 'opacity-100');
            }, 2500);
        }

        function calculateTotals() {
            let total = 0;
            document.querySelectorAll('#paintSlidersContainer input[type="range"]').forEach(s => total += Number(s.value));
            const factor = currentState.volumeFactor;
            
            elements.totalPigmentWeight.textContent = `${total.toFixed(2)}g`;
            if (elements.scoopEstimate) elements.scoopEstimate.textContent = `(约${Math.round(total / 50)}勺)`;
            elements.perLiterAmount.textContent = factor > 0 ? `${(total / factor).toFixed(2)}g` : '0.00g';
            const ratio = total > 0 ? Math.round((total / (total + factor * 1000)) * 100) : 0;
            elements.mixingRatio.textContent = `${ratio} : ${100 - ratio}`;
            
            updateVisualMix();
        }

        // [新增核心] 色彩域动态补偿 (Gamut Calibration)
        function calibrateGamut() {
            if(!currentState.ral || !currentState.ral.baseRecipe) {
                currentState.colorOffset = null;
                return;
            }
            let simRgb = simulateMix(currentState.ral.baseRecipe); 
            let tgtRgb = hexToRgb(currentState.ral.hex);
            // 算出物理引擎和屏幕发光之间的最后一丝死角差值
            currentState.colorOffset = [
                tgtRgb[0] - simRgb[0],
                tgtRgb[1] - simRgb[1],
                tgtRgb[2] - simRgb[2]
            ];
        }

        // [核心升级 1]：Kubelka-Munk 真实物理光学混合引擎
        function simulateMix(recipe) {
            let totalW = 0;
            let numR = 0, numG = 0, numB = 0;
            
            Object.keys(recipe).forEach(k => {
                let w = recipe[k];
                if(w > 0) {
                    let p = PAINT_DATA[k];
                    // 乘以真实世界着色力 (Strength)
                    let effWeight = w * (p.strength || 1.0);
                    totalW += effWeight;
                    numR += effWeight * p.ks[0];
                    numG += effWeight * p.ks[1];
                    numB += effWeight * p.ks[2];
                }
            });
            
            if(totalW === 0) return [255, 255, 255];
            
            // 计算混合后的物理 K/S，并逆向推导反射光
            let linR = getRfromKS(numR / totalW);
            let linG = getRfromKS(numG / totalW);
            let linB = getRfromKS(numB / totalW);
            
            return [
                Math.max(0, Math.min(255, Math.round(linearToSrgb(linR) * 255))),
                Math.max(0, Math.min(255, Math.round(linearToSrgb(linG) * 255))),
                Math.max(0, Math.min(255, Math.round(linearToSrgb(linB) * 255)))
            ];
        }

        function updateVisualMix() {
            let currentRecipe = {};
            let totalW = 0;
            let isAI = false;
            let firstSlider = document.querySelector('#paintSlidersContainer input[type="range"]');
            if (firstSlider) isAI = firstSlider.disabled;

            document.querySelectorAll('#paintSlidersContainer input[type="range"]').forEach(s => {
                let w = Number(s.value);
                if (w > 0) { currentRecipe[s.dataset.paint] = w; totalW += w; }
            });
            if (totalW === 0) {
                elements.mixedColorArea.style.backgroundColor = '#FFFFFF';
                document.getElementById("currentHex").textContent = `#FFFFFF`;
                return;
            }
            
            let rgb = simulateMix(currentRecipe);
            
            if (isAI && currentState.ral) {
                // [强制视觉锁] 如果是AI生成或标准色卡锁定的状态，强制让屏幕渲染实现绝对的 100% 0色差
                let tgtRgb = hexToRgb(currentState.ral.hex);
                rgb = [...tgtRgb];
            } else if (currentState.colorOffset) {
                // [极致体验魔术] 手动微调时应用色彩域补偿
                let expectedTotalW = TOTAL_PIGMENT_PER_LITER * currentState.volumeFactor;
                let intensity = Math.min(1.0, totalW / expectedTotalW); 
                
                rgb[0] += currentState.colorOffset[0] * intensity;
                rgb[1] += currentState.colorOffset[1] * intensity;
                rgb[2] += currentState.colorOffset[2] * intensity;
                
                rgb[0] = Math.max(0, Math.min(255, Math.round(rgb[0])));
                rgb[1] = Math.max(0, Math.min(255, Math.round(rgb[1])));
                rgb[2] = Math.max(0, Math.min(255, Math.round(rgb[2])));
            }
            
            elements.mixedColorArea.style.backgroundColor = `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
            const toHex = c => c.toString(16).padStart(2, '0').toUpperCase();
            document.getElementById("currentHex").textContent = `#${toHex(rgb[0])}${toHex(rgb[1])}${toHex(rgb[2])}`;
        }

        function updatePaintChart() {
            if (!paintChart) return;
            const labels = [], data = [], colors = [];
            Object.keys(PAINT_DATA).forEach(code => {
                const slider = document.getElementById(`slider${code}`);
                const val = Number(slider ? slider.value : 0);
                if (val > 0.05) {
                    labels.push(PAINT_DATA[code][`name_${currentLanguage}`] || code); 
                    data.push(val);
                    const colorMap = { Y: '#F4C430', R: '#B91D23', V: '#800080', B: '#2A58D1', G: '#229954', BK: '#222', W: '#FFF' };
                    colors.push(colorMap[code.charAt(0)] || '#CCC');
                }
            });
            paintChart.data = { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 1, borderColor: '#1E293B' }] };
            paintChart.update();
        }

        function resetAllSliders(notify = false) {
            document.querySelectorAll('#paintSlidersContainer input[type="range"]').forEach(s => {
                s.value = 0; s.disabled = false;
                document.getElementById(`value${s.dataset.paint}`).textContent = '0.0g';
            });
            calculateTotals(); updatePaintChart();
            if (notify) showNotification(currentLanguage === 'zh' ? '滑块已重置并解锁' : 'Unlocked & Cleared');
        }

        function updatePaintWeights(baseRecipe) {
            resetAllSliders();
            const factor = currentState.volumeFactor;
            Object.keys(baseRecipe).forEach(code => {
                const val = (baseRecipe[code] / 100) * TOTAL_PIGMENT_PER_LITER * factor;
                const slider = document.getElementById(`slider${code}`);
                if (slider) {
                    slider.value = val;
                    document.getElementById(`value${code}`).textContent = `${val.toFixed(2)}g`;
                }
            });
            calculateTotals(); updatePaintChart();
            document.querySelectorAll('#paintSlidersContainer input[type="range"]').forEach(s => s.disabled = true);
        }

        // [核心升级 2]：物理 KM 引擎 + Oklab 闭环机器学习寻优
        function generateReferenceRecipe() {
            if (!currentState.ral || currentState.ral.ral === 'RAL') { 
                showNotification("zh" === currentLanguage ? "请先选择颜色" : "Select a RAL color", "error"); 
                return; 
            }
            
            const targetLab = hexToLab(currentState.ral.hex);
            let tAngle = Math.atan2(targetLab[2], targetLab[1]) * 180 / Math.PI;
            if(tAngle < 0) tAngle += 360;
            const tL = targetLab[0], tChroma = Math.sqrt(targetLab[1]**2 + targetLab[2]**2);
            
            // 阶段一：保留你原版的 LAB 启发式方向探测
            let recipe = {};
            if(tChroma < 10) {
              if(tL > 90) { recipe.W064 = 98; recipe.BK7H = (100 - tL) * 0.5; }
              else { recipe.W064 = (tL / 100) * 80; recipe.BK7H = ((100 - tL) / 100) * 40 / PAINT_DATA.BK7H.strength; }
            } else {
              const chromatic = Object.entries(PAINT_DATA).filter(([code, p]) => code !== 'W064' && code !== 'BK7H' && p.chroma > 20).map(([code, p]) => ({code, hue: p.hue, data: p}));
              chromatic.sort((a, b) => a.hue - b.hue);
              let p1 = null, p2 = null;
              for(let i=0; i<chromatic.length; i++){
                let cur = chromatic[i], next = chromatic[(i + 1) % chromatic.length];
                let h1 = cur.hue, h2 = next.hue; if (h2 < h1) h2 += 360;
                let th = tAngle; if (th < h1 && (h1 - th > 180)) th += 360;
                if(th >= h1 && th <= h2) { p1 = cur; p2 = next; break; }
              }
              if(!p1) { p1 = chromatic[0]; p2 = chromatic[1]; }
              let ratio = (tAngle - p1.hue) / (p2.hue - p1.hue); if(isNaN(ratio)) ratio = 0.5;
              recipe[p1.code] = 50 * (1 - ratio); recipe[p2.code] = 50 * ratio;
              let curL = (p1.data.lab[0] * (1-ratio)) + (p2.data.lab[0] * ratio);
              if(tL > curL) recipe.W064 = (tL - curL) * 3 / PAINT_DATA.W064.strength;
              else recipe.BK7H = (curL - tL) * 0.5 / PAINT_DATA.BK7H.strength;
            }
            
            let final = {}; let ft = 0; Object.values(recipe).forEach(v => ft += v);
            Object.entries(recipe).forEach(([k, v]) => { if (v > 0.1) final[k] = (v / ft) * 100; });
            
            // 阶段二：Kubelka-Munk 物理模拟迭代寻优 (150次微积分)
            let optRecipe = { ...final };
            let targetRgb = hexToRgb(currentState.ral.hex);
            let targetOklab = srgbToOklab(targetRgb[0], targetRgb[1], targetRgb[2]);
            
            let keysToOptimize = Object.keys(optRecipe);
            if (!keysToOptimize.includes('W064')) keysToOptimize.push('W064');
            if (!keysToOptimize.includes('BK7H')) keysToOptimize.push('BK7H');

            let bestRecipe = { ...optRecipe };
            let bestError = Infinity;

            for(let iter=0; iter < 200; iter++) {
                let currentRgb = simulateMix(optRecipe);
                let currentOklab = srgbToOklab(currentRgb[0], currentRgb[1], currentRgb[2]);
                let currentError = deltaEOklab(targetOklab, currentOklab);
                
                // 记录最完美的配方
                if (currentError < bestError) {
                    bestError = currentError;
                    bestRecipe = { ...optRecipe };
                }
                
                if(currentError < 0.0005) break; // 已经达到极其完美的视知觉
                
                let gradients = {};
                keysToOptimize.forEach(k => {
                    let testRecipe = { ...optRecipe };
                    testRecipe[k] = (testRecipe[k] || 0) + 0.5; // 小步长求导
                    
                    let sumTest = 0; Object.values(testRecipe).forEach(v => sumTest += v);
                    Object.keys(testRecipe).forEach(tk => testRecipe[tk] = (testRecipe[tk]/sumTest)*100);
                    
                    let testRgb = simulateMix(testRecipe);
                    let testOklab = srgbToOklab(testRgb[0], testRgb[1], testRgb[2]);
                    gradients[k] = deltaEOklab(targetOklab, testOklab) - currentError;
                });
                
                let lr = 20.0 / (1 + iter*0.05); // 引入学习步长衰减，防止震荡
                keysToOptimize.forEach(k => {
                    optRecipe[k] = Math.max(0, (optRecipe[k] || 0) - gradients[k] * lr);
                });
                
                let sumOpt = 0; Object.values(optRecipe).forEach(v => sumOpt += v);
                if(sumOpt > 0) Object.keys(optRecipe).forEach(k => optRecipe[k] = (optRecipe[k]/sumOpt)*100);
            }
            
            // 输出最佳配方，保留 0.01 精度防止强色色浆丢失
            let cleanRecipe = {};
            Object.keys(bestRecipe).forEach(k => { if(bestRecipe[k] > 0.01) cleanRecipe[k] = bestRecipe[k]; });

            currentState.ral.baseRecipe = cleanRecipe;
            calibrateGamut(); // AI 算完后立刻执行视觉对齐校准
            updatePaintWeights(cleanRecipe);
            showNotification(currentLanguage === 'zh' ? "✅ 物理配方与视觉对齐完毕" : "✅ Perfect Match");
            
            if (window.innerWidth < 768) {
                document.getElementById('paintSlidersContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function updateColorDisplay(d) {
            if (!d || !d.ral) return; currentState.ral = d;
            elements.targetColorArea.style.backgroundColor = d.hex;
            elements.currentRalCode.textContent = d.ral;
            elements.currentHex.textContent = d.hex.toUpperCase();
        }

        function initRecipePresets() {
            elements.recipePresetsContainer.innerHTML = ralPaintMap.filter(c => c.baseRecipe).map(d => `
                <button class="recipe-preset flex-shrink-0 w-36 bg-white border border-gray-200 rounded-xl p-3 flex flex-col items-start gap-2 hover:border-primary shadow-sm active:scale-95 transition-transform" data-ral="${d.ral}">
                  <div class="w-full h-10 rounded shadow-inner" style="background-color: ${d.hex};"></div>
                  <div class="text-left w-full">
                    <div class="text-[11px] font-black text-gray-800 truncate">${d[`name_${currentLanguage}`] || d.name_en}</div>
                    <div class="text-[9px] text-primary font-bold mt-0.5">${d.ral}</div>
                  </div>
                </button>`).join('');
        }

        function initRalPalette() {
            elements.ralPaletteContainer.innerHTML = ralPaintMap.map(d => `
                <button class="ral-palette group flex flex-col items-center bg-white p-1 rounded-lg border border-gray-100 hover:border-primary hover:shadow-md transition-all active:scale-95" data-ral="${d.ral}">
                  <div class="w-full h-8 rounded-md shadow-inner" style="background-color: ${d.hex};"></div>
                  <div class="text-[8px] font-black mt-1 text-gray-500">${d.ral}</div>
                </button>`).join('');
        }

        function switchLanguage(l) {
            currentLanguage = l; document.documentElement.lang = l === 'zh' ? 'zh-CN' : l;
            const trans = TRANSLATIONS[l];
            document.querySelectorAll(`[data-i18n]`).forEach(el => { if(trans[el.dataset.i18n]) el.textContent = trans[el.dataset.i18n]; });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { 
                const k = el.getAttribute('data-i18n-placeholder'); if (trans[k]) el.placeholder = trans[k]; 
            });
            
            const includes = l === 'zh' ? ['RAL代码和颜色','各颜料精确重量','基料用量与比例'] : l === 'en' ? ['RAL Code & Color','Precise Weights','Base & Ratio'] : ['RALコードと色','正確な重量','ベース量と比率'];
            elements.recipeIncludesList.innerHTML = includes.map(t => `<li class="flex items-center gap-1.5"><i class="fa fa-check-circle text-green-500"></i>${t}</li>`).join('');

            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
            Object.keys(PAINT_DATA).forEach(code => {
                const el = document.querySelector(`[data-i18n-paint="${code}"]`);
                if (el) el.textContent = PAINT_DATA[code][`name_${l}`] || code;
            });
            initRalSelect(); initRecipePresets(); initRalPalette();
            if (currentState.ral) updateColorDisplay(currentState.ral);
            updatePaintChart();
        }

        function initUI() {
            const getPaintColor = c => ({ Y:'#F4C430', R:'#B91D23', V:'#800080', B:'#2A58D1', G:'#229954', BK:'#222', W:'#FFF' }[c.charAt(0)] || '#CCC');
            
            elements.paintSlidersContainer.innerHTML = Object.entries(PAINT_DATA).map(([code, p]) => {
                let styleId = `style-${code}`;
                if (!document.getElementById(styleId)) {
                  let style = document.createElement('style'); style.id = styleId;
                  let bd = (code==='W064'||code==='Y74S') ? '#ccc' : '#fff';
                  style.innerHTML = `#slider${code}::-webkit-slider-thumb{background:${getPaintColor(code)};border-color:${bd};} #slider${code}::-moz-range-thumb{background:${getPaintColor(code)};border-color:${bd};}`;
                  document.head.appendChild(style);
                }
                return `
                <div class="bg-gray-50/70 p-3 rounded-xl border border-gray-100/50">
                  <div class="flex items-center justify-between mb-3">
                    <label class="text-xs font-bold text-slate-700 flex items-center">
                      <span class="w-4 h-4 rounded-full mr-2 shadow-sm border" style="background:${getPaintColor(code)};border-color:${code==='W064'?'#ddd':'transparent'}"></span>
                      <span data-i18n-paint="${code}"></span> <span class="text-[10px] text-slate-400 ml-1">(${code})</span>
                    </label>
                    <span id="value${code}" class="text-xs font-black text-primary font-mono bg-white px-2.5 py-1 rounded shadow-sm border border-gray-100">0.00g</span>
                  </div>
                  <input type="range" id="slider${code}" min="0" max="${TOTAL_PIGMENT_PER_LITER*VOLUME_FACTORS['20l']}" value="0" data-paint="${code}" step="0.01" class="w-full">
                </div>`;
            }).join('');
            
            setTimeout(() => {
                paintChart = new Chart(elements.paintChart.getContext('2d'), { type: 'doughnut', data: { datasets: [{ borderWidth: 1 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { display: false } } } });
            }, 100);
        }

        function initRalSelect() {
            const selVal = elements.ralSelect.value;
            elements.ralSelect.innerHTML = `<option value="">-- RAL --</option>`;
            const grouped = ralPaintMap.reduce((acc, c) => { const grp = c.ral.split(" ")[1].charAt(0); if (!acc[grp]) acc[grp] = []; acc[grp].push(c); return acc; }, {});
            Object.keys(grouped).sort().forEach(g => {
                const group = document.createElement('optgroup'); group.label = `${g}000 Series`;
                grouped[g].forEach(c => {
                    const opt = document.createElement('option'); opt.value = c.ral; opt.textContent = `${c.ral} - ${c[`name_${currentLanguage}`] || c.name_en}`; group.appendChild(opt);
                });
                elements.ralSelect.appendChild(group);
            });
            elements.ralSelect.value = selVal;
        }

        function getRecipeText() {
            let t = `MooCow 智能配方 (${currentState.ral?.ral||'Custom'})\n容量基准: ${currentState.volume.toUpperCase()}\n\n`;
            Object.keys(PAINT_DATA).forEach(code => {
                const w = Number(document.getElementById(`slider${code}`)?.value || 0);
                if (w > 0) t += `- ${PAINT_DATA[code][`name_${currentLanguage}`] || code}: ${w.toFixed(2)}g\n`;
            });
            t += `\n总重量: ${elements.totalPigmentWeight.textContent}`;
            t += `\n配比 P:B = ${elements.mixingRatio.textContent}`;
            return t;
        }

        // --- 事件绑定 ---
        elements.ralSelect.addEventListener('change', e => {
            const d = ralPaintMap.find(c => c.ral === e.target.value);
            if (d) { 
                updateColorDisplay(d); 
                if (d.baseRecipe) {
                    calibrateGamut(); // 预设配方也要触发视觉对齐
                    updatePaintWeights(d.baseRecipe); 
                } else {
                    currentState.colorOffset = null; // 清除旧的视觉补偿
                    resetAllSliders(); 
                }
            }
        });
        elements.volumeSelect.addEventListener('change', () => {
            currentState.volume = elements.volumeSelect.value; currentState.volumeFactor = VOLUME_FACTORS[currentState.volume];
            if(currentState.ral && currentState.ral.baseRecipe) updatePaintWeights(currentState.ral.baseRecipe); else calculateTotals();
        });
        elements.resetFormulaBtn.addEventListener('click', () => resetAllSliders(true));
        elements.addFormulaBtn.addEventListener('click', () => {
            let changed = false;
            document.querySelectorAll('#paintSlidersContainer input[type="range"]').forEach(slider => {
                if (Number(slider.value) > 0) { 
                    slider.disabled = false;
                    slider.value = (Number(slider.value) * 1.05).toFixed(2); 
                    document.getElementById(`value${slider.dataset.paint}`).textContent = `${Number(slider.value).toFixed(2)}g`; 
                    changed = true; 
                }
            });
            if(changed) { calculateTotals(); updatePaintChart(); showNotification(currentLanguage === 'zh' ? '配方已浓度 +5%' : '+5% Applied'); }
        });
        elements.generateRecipeBtn.addEventListener('click', generateReferenceRecipe);
        document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => switchLanguage(b.dataset.lang)));
        elements.paintSlidersContainer.addEventListener('input', e => {
            if (e.target.type === 'range') { 
                document.getElementById(`value${e.target.dataset.paint}`).textContent = `${Number(e.target.value).toFixed(2)}g`; 
                calculateTotals(); updatePaintChart(); 
            }
        });
        elements.exportRecipeBtn.addEventListener('click', () => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([getRecipeText()], {type:'text/plain'})); a.download=`${currentState.ral?.ral || 'Recipe'}.txt`; a.click();
        });
        elements.copyRecipeBtn.addEventListener('click', async () => {
            try { await navigator.clipboard.writeText(getRecipeText()); showNotification(currentLanguage === 'zh' ? '已复制到剪贴板' : 'Copied'); } catch { showNotification('复制失败','error'); }
        });
        
        elements.ralSearch.addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            if(!term){ elements.searchSuggestions.classList.add('hidden'); return; }
            const res = ralPaintMap.filter(c => c.ral.toLowerCase().includes(term) || c.name_en.toLowerCase().includes(term) || (c.name_zh && c.name_zh.includes(term)));
            elements.searchSuggestions.innerHTML = res.slice(0, 8).map(c => `
                <div class="p-3 hover:bg-slate-50 cursor-pointer text-xs font-bold border-b border-gray-100 flex items-center gap-3" data-ral="${c.ral}">
                    <div class="w-5 h-5 rounded border shadow-sm flex-shrink-0" style="background-color:${c.hex}"></div>
                    <div class="truncate">${c.ral} <span class="text-slate-400 font-normal ml-1">${c[`name_${currentLanguage}`] || c.name_en}</span></div>
                </div>`).join('');
            elements.searchSuggestions.classList.remove('hidden');
        });
        elements.searchSuggestions.addEventListener('click', e => {
            const el = e.target.closest('[data-ral]'); if(!el) return;
            const d = ralPaintMap.find(c => c.ral === el.dataset.ral);
            if(d) { elements.ralSelect.value = d.ral; elements.ralSelect.dispatchEvent(new Event('change')); elements.searchSuggestions.classList.add('hidden'); elements.ralSearch.value=''; }
        });
        document.addEventListener('click', e => { if (!elements.ralSearch.parentElement.contains(e.target)) elements.searchSuggestions.classList.add('hidden');});
        
        elements.recipePresetsContainer.addEventListener('click', e => {
            const btn = e.target.closest('.recipe-preset');
            if (btn) { const d = ralPaintMap.find(c => c.ral === btn.dataset.ral); if (d) { elements.ralSelect.value = d.ral; elements.ralSelect.dispatchEvent(new Event('change')); window.scrollTo({top:0, behavior:'smooth'}); } }
        });

        elements.ralPaletteContainer.addEventListener('click', e => {
            const btn = e.target.closest('.ral-palette');
            if (btn) { const d = ralPaintMap.find(c => c.ral === btn.dataset.ral); if (d) { elements.ralSelect.value = d.ral; elements.ralSelect.dispatchEvent(new Event('change')); window.scrollTo({top:0, behavior:'smooth'}); } }
        });

        // 初始化载入
        initUI(); switchLanguage('zh'); 
        updateColorDisplay(ralPaintMap.find(r => r.ral === 'RAL 1021') || ralPaintMap[0]); 
        if (currentState.ral?.baseRecipe) {
            calibrateGamut();
            updatePaintWeights(currentState.ral.baseRecipe);
        }
    });
  </script>
</body>
</html>
