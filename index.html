<!DOCTYPE html><html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MooCow Mini 调色工具 (Smart Match Ver.)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2A58D1', secondary: '#F4C430', accent: '#B91D23',
            neutral: '#F5F7FA', dark: '#333333',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .slider-thumb { @apply appearance-none w-8 h-8 rounded-full cursor-pointer transition-all duration-200 hover:scale-125 shadow-md border-2 border-white; }
      .paint-dot { @apply w-4 h-4 rounded-full border border-gray-300 mr-2 flex-shrink-0; }
      .lang-btn { @apply px-3 py-1.5 text-sm font-medium rounded-lg transition-all duration-200 border border-gray-200 shadow-sm; }
    }
    input[type="range"] { 
      @apply appearance-none w-full h-4 rounded-full bg-gray-200 outline-none transition-all;
      touch-action: none;
    }
    input[type="range"]::-webkit-slider-thumb { @apply slider-thumb; }
    input[type="range"]::-moz-range-thumb { @apply slider-thumb; }
    input[type="range"]:disabled { @apply bg-gray-300 cursor-not-allowed; }

    /* 滑块颜色专用映射 */
    #sliderY83S::-webkit-slider-thumb, #sliderY74S::-webkit-slider-thumb, #sliderY42S::-webkit-slider-thumb { @apply bg-[#F4C430]; }
    #sliderB150S::-webkit-slider-thumb { @apply bg-[#2A58D1]; }
    #sliderR254D::-webkit-slider-thumb, #sliderR101Y::-webkit-slider-thumb, #sliderR101V::-webkit-slider-thumb, #sliderR122S::-webkit-slider-thumb { @apply bg-[#B91D23]; }
    #sliderW064::-webkit-slider-thumb { @apply bg-white border border-gray-300; }
    #sliderV23::-webkit-slider-thumb { @apply bg-[#800080]; }
    #sliderG7::-webkit-slider-thumb { @apply bg-[#229954]; }
    #sliderBK7H::-webkit-slider-thumb { @apply bg-[#000000]; }
    
    .lang-btn.active { @apply bg-primary text-white border-primary; }
    .lang-btn:not(.active) { @apply bg-white text-gray-600 hover:bg-gray-50; }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
  </style>
</head>
<body class="bg-neutral font-sans text-dark min-h-screen py-4 md:py-8 px-4 md:px-6">
  <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
    <!-- Header Area -->
    <div class="bg-primary text-white p-6 md:p-10 relative overflow-hidden">
      <div class="absolute top-0 right-0 w-48 h-48 bg-white/10 rounded-full -mr-16 -mt-16"></div>
      <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-6">
        <div>
          <h1 class="text-3xl md:text-4xl font-black tracking-tighter">MooCow Mini <span class="text-xs bg-accent px-2 py-0.5 rounded align-top ml-1">SMART MIX</span></h1>
          <p id="appSubtitle" class="text-white/80 mt-1 font-medium text-sm md:text-base" data-i18n="subtitle"></p>
        </div>
        <div class="flex gap-1 bg-white/10 rounded-xl p-1 backdrop-blur-sm">
          <button class="lang-btn" data-lang="zh">中文</button>
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="ja">日本語</button>
        </div>
      </div>
    </div>
    
    <div class="p-6 md:p-10 space-y-10">
      <!-- Disclaimer Section -->
      <div id="disclaimer" class="p-4 bg-indigo-50 border-l-4 border-indigo-500 rounded-r-xl shadow-sm">
        <div class="flex items-start gap-3">
          <div class="flex-shrink-0 text-indigo-500 pt-0.5"><i class="fa fa-info-circle text-lg"></i></div>
          <div>
            <h3 class="text-sm font-black text-indigo-900" data-i18n="disclaimer_title"></h3>
            <p class="text-[11px] md:text-xs text-indigo-800/80 mt-1 leading-relaxed" data-i18n="disclaimer_text"></p>
          </div>
        </div>
      </div>
      
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
        <!-- Left Column -->
        <div class="lg:col-span-5 space-y-8">
          <section class="space-y-4">
            <div class="flex items-center gap-2 text-primary font-black uppercase text-sm tracking-widest">
              <span class="w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center text-[10px]">01</span>
              <h2 data-i18n="target_color_selection"></h2>
            </div>
            <div class="bg-gray-50 rounded-2xl p-6 space-y-5 border border-gray-100 shadow-inner">
              <div class="flex flex-col gap-5">
                <div class="w-full h-32 rounded-xl border-4 border-white overflow-hidden shadow-lg relative">
                  <div id="colorSwatch" class="w-full h-full transition-colors duration-700 bg-white shadow-inner"></div>
                </div>
                <div class="space-y-4">
                  <div>
                    <label for="ralSearch" class="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-tighter" data-i18n="ral_search_label"></label>
                    <div class="relative">
                      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fa fa-search"></i></span>
                      <input type="text" id="ralSearch" data-i18n-placeholder="ral_search_placeholder" class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all font-bold text-sm bg-white">
                      <div id="searchSuggestions" class="absolute w-full mt-2 bg-white border border-gray-200 rounded-xl shadow-2xl z-50 max-h-72 overflow-y-auto hidden py-2 border-t-4 border-t-primary"></div>
                    </div>
                  </div>
                  <div>
                    <label for="ralSelect" class="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-tighter" data-i18n="ral_select_label"></label>
                    <select id="ralSelect" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl bg-white focus:ring-4 focus:ring-primary/10 outline-none transition-all font-bold text-sm"></select>
                  </div>
                  <div class="flex flex-wrap gap-4 pt-3 border-t border-gray-200/50">
                    <div class="text-[10px]"><span class="text-gray-400 font-bold uppercase block" data-i18n="current_ral"></span><strong id="currentRalCode" class="text-primary text-sm"></strong></div>
                    <div class="text-[10px]"><span class="text-gray-400 font-bold uppercase block" data-i18n="color_value"></span><strong id="currentHex" class="text-primary text-sm font-mono tracking-tighter"></strong></div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="space-y-4">
            <div class="bg-primary/5 rounded-3xl p-6 border border-primary/10 space-y-5">
              <h3 class="text-xs font-black text-primary uppercase tracking-[0.2em]" data-i18n="paint_ratio"></h3>
              <div class="space-y-4">
                <div class="flex justify-between items-end border-b border-primary/10 pb-3">
                  <span class="text-gray-500 text-xs font-bold uppercase" data-i18n="total_pigment_weight"></span>
                  <div class="text-right">
                    <strong id="totalPigmentWeight" class="text-primary text-3xl font-black font-mono tracking-tighter leading-none">0.0g</strong>
                    <div id="scoopEstimate" class="text-[10px] text-primary/60 font-bold uppercase mt-1 italic"></div>
